name: Auto Build Front for STG
run-name: 'Build e-commerce-jsf and push image for Staging'

on:
  push:
    branches:
      - master
      - 'release/homelab/[2-9][0-9][0-9][0-9][0-1][0-9][0-3][0-9]'
    paths-ignore:
      - 'devops/**'
      - '.github/**'
  create:

concurrency:
  group: 'build-staging'
  cancel-in-progress: true

jobs:
  build:
    name: e-commerce-storefront-jsf
    uses: devops-framework/iac-vagrant-k8s-cluster-local/.github/workflows/wc-reusable-auto-build-image.yml@dev
    permissions:
      contents: write
    with:
      app_name: 'e-commerce-jsf'
      gha_environment: staging
      dockerfile_path: "./devops/ci/docker/staging/Dockerfile"
    secrets: inherit
