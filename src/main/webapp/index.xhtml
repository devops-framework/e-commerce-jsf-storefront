<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">

<h:head>
    <title>E-Commerce Backend Tester</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 20px; background-color: #f8f9fa; color: #212529; }
        h1 { color: #007bff; }
        h2 { border-bottom: 1px solid #dee2e6; padding-bottom: 5px; margin-top: 30px; }
        .container { max-width: 960px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        .label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-text { padding: 8px; border-radius: 4px; border: 1px solid #ced4da; width: 200px; }
        .button { padding: 8px 15px; border-radius: 4px; border: none; background-color: #007bff; color: white; cursor: pointer; }
        .response-box { background-color: #e9ecef; border: 1px solid #ced4da; padding: 15px; border-radius: 4px; margin-top: 10px; white-space: pre-wrap; word-wrap: break-word; font-family: "SF Mono", "Fira Code", "Consolas", monospace; }
        .responses { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</h:head>

<h:body>
    <div class="container">
        <h1>E-Commerce Backend Tester</h1>
        <p>Enter an ID to fetch data from the Product and Order backend services.</p>

        <h:form>
            <div class="form-group">
                <h:outputLabel for="id-input" value="Enter ID:" styleClass="label" />
                <h:inputText id="id-input" value="#{storefrontBean.inputId}" styleClass="input-text" />
            </div>
            <h:commandButton value="Fetch Data" action="#{storefrontBean.fetchData}" styleClass="button" />
        </h:form>

        <div class="responses">
            <div class="product-response">
                <h2>Product Service Response</h2>
                <div class="response-box">
                    <h:outputText value="#{storefrontBean.productResponse}" />
                </div>
            </div>

            <div class="order-response">
                <h2>Order Service Response</h2>
                <div class="response-box">
                    <h:outputText value="#{storefrontBean.orderResponse}" />
                </div>
            </div>
        </div>
    </div>
</h:body>
</html>
