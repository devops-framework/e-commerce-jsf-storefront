apiVersion: v1
kind: Service
metadata:
  name: "storefront-service-{{ .Values.envt }}"
spec:
  type: NodePort
  selector:
    app: storefront
  ports:
    - protocol: TCPs
      port: 80           # Port của Service
      targetPort: 8080   # Port của Container
      nodePort: 30080    # Port cố định để truy cập từ ngoài cluster (nếu cần)
