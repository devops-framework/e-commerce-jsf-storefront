apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront
  namespace: frontend-stg
  labels:
    app: storefront
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storefront
  template:
    metadata:
      labels:
        app: storefront
    spec:
      containers:
        - name: storefront
          # Giả định tên image, bạn hãy cập nhật nếu khác
          image: tantran0411/e-commerce-jsf:gha-staging-master-c513a31
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            # MicroProfile Config tự động map biến môi trường này vào @ConfigProperty(name = "order.service.base.url")
            # Code java tự thêm "http://", nên ở đây chỉ điền host:port
            - name: ORDER_SERVICE_BASE_URL
              value: "order-service.ec-stg:8080"
            
            # Map vào @ConfigProperty(name = "product.service.base.url")
            - name: PRODUCT_SERVICE_BASE_URL
              value: "product-service-svc.ec-stg:8080"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
